version: '3.8'

services:
  # ==================== 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: daoda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: daoda
      POSTGRES_USER: daoda
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Daoda@2026!}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    networks:
      - daoda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daoda"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: daoda-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-Daoda@Redis!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - daoda-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 后端 API ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daoda-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://daoda:${DB_PASSWORD}@postgres:5432/daoda
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - daoda-network

  # ==================== 统一前端（官网 + 门户） ====================
  frontend:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: daoda-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - daoda-network

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: daoda-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - api
    networks:
      - daoda-network

volumes:
  postgres_data:
  redis_data:

networks:
  daoda-network:
    driver: bridge
