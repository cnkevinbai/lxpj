<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA 相关 -->
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OpenClaw" />
  <link rel="apple-touch-icon" href="/icons/icon-144x144.svg" />
  <link rel="manifest" href="/manifest.json" />
  
  <!-- SEO -->
  <meta name="description" content="OpenClaw - AI 驱动的智能控制面板" />
  <meta name="keywords" content="OpenClaw, AI, 控制面板, Dashboard" />
  
  <title>OpenClaw 控制面板</title>
</head>
<body class="bg-[#0F172A] text-white">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- PWA Service Worker 注册 (仅生产环境) -->
  <script>
    if ('serviceWorker' in navigator && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered:', registration.scope);
          })
          .catch((error) => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
