version: '3.8'

services:
  # PostgreSQL 数据库
  postgresql:
    image: postgres:15
    container_name: iov-postgres
    environment:
      POSTGRES_DB: iov_platform
      POSTGRES_USER: iov_user
      POSTGRES_PASSWORD: iov_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - iov_network

  # TimescaleDB (基于PostgreSQL的时序数据库)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: iov-timescaledb
    environment:
      POSTGRES_DB: iov_timescale
      POSTGRES_USER: iov_user
      POSTGRES_PASSWORD: iov_password
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - iov_network

  # ClickHouse 分析数据库
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: iov-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: iov_analytics
      CLICKHOUSE_USER: iov_user
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - iov_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: iov-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - iov_network

  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:5.0
    container_name: iov-emqx
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # WebSocket
      - "8084:8084"    # WSS
      - "8883:8883"    # MQTTS
      - "18083:18083"  # Dashboard
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=0.0.0.0
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=public
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - iov_network

  # Kafka 消息队列
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: iov-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - iov_network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: iov-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: iov-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - iov_network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: iov-minio
    ports:
      - "9001:9001"
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - iov_network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: iov-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - iov_network

  # Grafana 可视化
  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: iov-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - iov_network

volumes:
  postgres_data:
  timescale_data:
  clickhouse_data:
  redis_data:
  emqx_data:
  emqx_log:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  iov_network:
    driver: bridge