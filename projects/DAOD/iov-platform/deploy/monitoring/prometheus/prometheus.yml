global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'iov-platform'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot 应用监控
  - job_name: 'spring-boot-apps'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'gateway:8080'
          - 'vehicle-access:8080'
          - 'monitor-service:8080'
          - 'alarm-service:8080'
          - 'ota-service:8080'
          - 'remote-control:8080'
          - 'user-service:8080'
          - 'auth-service:8080'
          - 'tenant-service:8080'
        labels:
          group: 'iov-services'

  # PostgreSQL 监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Kafka 监控
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Elasticsearch 监控
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']

  # MinIO 监控
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ['minio:9000']

  # Nacos 监控
  - job_name: 'nacos'
    static_configs:
      - targets: ['nacos:8848']

  # Node Exporter (主机监控)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']