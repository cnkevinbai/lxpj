# Planning Service - 调度规划服务

id: planning-service
name: Planning Service
version: 1.0.0
description: 调度规划服务，提供路径规划、行程规划、车队调度能力
type: service
priority: 55

dependencies:
  - common-core

provides:
  - api: PlanningService
    version: 1.0.0

configuration:
  planning:
    algorithm: dijkstra
    max-waypoints: 100
  
  fleet:
    max-vehicles: 500

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/planning
    port: 8080