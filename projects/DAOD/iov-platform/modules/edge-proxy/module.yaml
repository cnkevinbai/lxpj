apiVersion: iov.daod.com/v1
kind: Module
metadata:
  name: edge-proxy
  version: 1.0.0
  description: 边缘代理模块 - 云边协同通信代理
  author: daod-team
  license: proprietary

spec:
  type: extension
  priority: 60
  
  dependencies:
    - name: plugin-framework
      version: "^1.0.0"
    - name: common-core
      version: ">=1.0.0"

  extensionPoints:
    - name: edge-protocol
      interface: com.daod.iov.modules.edgeproxy.EdgeProtocol
      description: 边缘协议扩展点
    - name: data-sync-handler
      interface: com.daod.iov.modules.edgeproxy.DataSyncHandler
      description: 数据同步处理器

  configSchema:
    properties:
      enabled:
        type: boolean
        default: true
      mqttBroker:
        type: string
        default: "tcp://localhost:1883"
        description: MQTT Broker地址
      edgeNodeId:
        type: string
        description: 边缘节点ID
      cloudEndpoint:
        type: string
        description: 云端服务地址
      syncInterval:
        type: integer
        default: 60000
        description: 数据同步间隔(毫秒)
      offlineCacheSize:
        type: integer
        default: 10000
        description: 离线缓存大小
      enableCompression:
        type: boolean
        default: true
        description: 是否启用数据压缩
      
  resources:
    cpu: "200m"
    memory: "512Mi"
    
  healthCheck:
    liveness: /health/live
    readiness: /health/ready
    
  hotReload:
    enabled: true
    strategy: rolling