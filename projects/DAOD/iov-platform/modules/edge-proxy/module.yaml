# Edge Proxy - 边缘代理

id: edge-proxy
name: Edge Proxy
version: 1.0.0
description: 边缘代理模块，提供协议代理、数据转发能力
type: edge
priority: 35

dependencies:
  - common-core

provides:
  - api: EdgeProxyService
    version: 1.0.0

configuration:
  proxy:
    enabled: true
    timeout: 30000
  
  protocols:
    - jtt808
    - mqtt
    - http

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/edge-proxy
    port: 8080