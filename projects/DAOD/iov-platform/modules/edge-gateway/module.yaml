# Edge Gateway - 边缘网关

id: edge-gateway
name: Edge Gateway
version: 1.0.0
description: 边缘网关模块，提供边缘计算、协议转换、数据预处理能力
type: edge
priority: 30

dependencies:
  - common-core
  - plugin-framework

provides:
  - api: EdgeGatewayService
    version: 1.0.0

configuration:
  edge:
    mode: standalone
    cloud-url: ${CLOUD_URL:http://gateway:8080}
    sync-interval: 60000
  
  cache:
    enabled: true
    max-size: 10000

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/edge
    port: 8080