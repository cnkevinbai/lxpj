# 监控服务模块配置

apiVersion: iov.daod.com/v1
kind: Module
metadata:
  name: monitor-service
  version: 1.0.0
  description: 监控服务模块 - 实时位置监控、轨迹回放、电子围栏
  author: daod-team
  license: Apache-2.0

spec:
  type: business
  priority: 80
  mainClass: com.daod.iov.modules.monitor.MonitorServiceModule
  
  dependencies:
    - name: plugin-framework
      version: ">=1.0.0"
      optional: false
    - name: common-core
      version: "^1.0.0"
      optional: false
    - name: event-bus
      version: "^1.0.0"
      optional: false
    - name: vehicle-access
      version: "^1.0.0"
      optional: false
  
  provides:
    - name: monitor-api
      version: "1.0.0"
      endpoints:
        - path: /api/v1/monitor/locations
          method: GET
          description: 获取实时位置
        - path: /api/v1/monitor/trajectory
          method: GET
          description: 获取轨迹数据
        - path: /api/v1/monitor/geofences
          method: GET
          description: 获取电子围栏
  
  consumes:
    - name: vehicle-api
      version: "^1.0.0"
      from: vehicle-access
    - name: event-bus
      version: "^1.0.0"
      from: event-bus
  
  permissions:
    - NETWORK_CONNECT
    - FILE_READ
    - FILE_WRITE
  
  resources:
    cpu: "300m"
    memory: "512Mi"
    maxConnections: 1000
  
  healthCheck:
    liveness: /health/live
    readiness: /health/ready
  
  hotReload:
    enabled: true
    strategy: rolling
    rollbackOnFailure: true