# Monitor Service - 监控服务

id: monitor-service
name: Monitor Service
version: 1.0.0
description: 实时监控服务，提供位置追踪、状态监控、视频监控能力
type: service
priority: 75

dependencies:
  - common-core
  - event-bus
  - vehicle-access

provides:
  - api: MonitorService
    version: 1.0.0

configuration:
  monitor:
    heartbeat-timeout: 300000
    position-buffer-size: 1000
  
  video:
    enabled: false
    max-streams: 10

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/monitor
    port: 8080