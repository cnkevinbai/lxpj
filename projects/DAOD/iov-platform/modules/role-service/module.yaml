# Role Service - 角色服务

id: role-service
name: Role Service
version: 1.0.0
description: 角色权限服务，提供角色管理、权限分配能力
type: service
priority: 85

dependencies:
  - common-core

provides:
  - api: RoleService
    version: 1.0.0

configuration:
  role:
    max-per-role: 100

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/role
    port: 8080