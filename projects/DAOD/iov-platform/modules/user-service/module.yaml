# User Service - 用户服务

id: user-service
name: User Service
version: 1.0.0
description: 用户服务，提供用户管理、个人信息维护能力
type: service
priority: 88

dependencies:
  - common-core

provides:
  - api: UserService
    version: 1.0.0

configuration:
  user:
    password-min-length: 8
    max-login-attempts: 5

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/user
    port: 8080