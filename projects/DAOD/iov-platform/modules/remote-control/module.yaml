# Remote Control - 远程控制服务

id: remote-control
name: Remote Control Service
version: 1.0.0
description: 远程控制服务，提供锁车/解锁、诊断指令、参数配置能力
type: service
priority: 80

dependencies:
  - common-core
  - vehicle-access

provides:
  - api: RemoteControlService
    version: 1.0.0

configuration:
  command:
    timeout: 30000
    max-retry: 3
    queue-size: 1000
  
  security:
    require-confirm: true

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/command
    port: 8080