# 车辆接入服务模块配置

apiVersion: iov.daod.com/v1
kind: Module
metadata:
  name: vehicle-access
  version: 1.0.0
  description: 车辆接入服务模块 - 车辆认证、注册、心跳管理、状态同步
  author: daod-team
  license: Apache-2.0

spec:
  type: business
  priority: 90
  mainClass: com.daod.iov.modules.vehicleaccess.VehicleAccessModule
  
  dependencies:
    - name: plugin-framework
      version: ">=1.0.0"
      optional: false
    - name: common-core
      version: "^1.0.0"
      optional: false
    - name: event-bus
      version: "^1.0.0"
      optional: false
    - name: tenant-service
      version: "^1.0.0"
      optional: false
  
  provides:
    - name: vehicle-api
      version: "1.0.0"
      endpoints:
        - path: /api/v1/vehicles
          method: GET
          description: 获取车辆列表
        - path: /api/v1/vehicles/{id}
          method: GET
          description: 获取车辆详情
        - path: /api/v1/vehicles/register
          method: POST
          description: 注册车辆
  
  extensionPoints:
    - name: vehicle-auth-handler
      interface: com.daod.iov.modules.vehicleaccess.api.VehicleAuthHandler
      description: 车辆认证处理器扩展点
      multiple: true
    - name: vehicle-event-listener
      interface: com.daod.iov.modules.vehicleaccess.api.VehicleEventListener
      description: 车辆事件监听器扩展点
      multiple: true
  
  consumes:
    - name: tenant-api
      version: "^1.0.0"
      from: tenant-service
    - name: event-bus
      version: "^1.0.0"
      from: event-bus
  
  permissions:
    - NETWORK_CONNECT
    - FILE_READ
    - FILE_WRITE
  
  resources:
    cpu: "200m"
    memory: "256Mi"
    maxConnections: 1000
  
  healthCheck:
    liveness: /health/live
    readiness: /health/ready
  
  hotReload:
    enabled: true
    strategy: rolling
    rollbackOnFailure: true