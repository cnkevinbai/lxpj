# Vehicle Access - 车辆接入服务

id: vehicle-access
name: Vehicle Access Service
version: 1.0.0
description: 车辆接入管理服务，提供设备绑定、车辆注册、协议适配核心能力
type: service
priority: 100

dependencies:
  - common-core
  - event-bus

provides:
  - api: BindingService
    version: 1.0.0
  - api: VehicleRegisterService
    version: 1.0.0

configuration:
  binding:
    auth-code-ttl: 86400000
    reconnect-window: 1800000
  
  vehicle:
    auto-create: true

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/vehicle
    port: 8080