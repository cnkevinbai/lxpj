# OTA Service - OTA 升级服务

id: ota-service
name: OTA Service
version: 1.0.0
description: OTA 升级服务，提供固件管理、版本控制、升级任务调度能力
type: service
priority: 65

dependencies:
  - common-core
  - storage-service

provides:
  - api: OtaService
    version: 1.0.0

configuration:
  ota:
    max-concurrent: 10
    retry-count: 3
    timeout: 300000
  
  firmware:
    storage-type: minio
    bucket: firmware

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/ota
    port: 8080