# MQTT Adapter - MQTT 协议适配器

id: mqtt-adapter
name: MQTT Adapter
version: 1.0.0
description: MQTT 协议适配器，支持 IoT 设备接入、Token 认证、设备影子同步
type: adapter
priority: 42

dependencies:
  - common-core
  - vehicle-access

provides:
  - api: MqttAdapterService
    version: 1.0.0

configuration:
  mqtt:
    broker-url: ${MQTT_BROKER:tcp://emqx:1883}
    client-id: iov-platform
    
  auth:
    jwt-secret: ${MQTT_JWT_SECRET:daod_iov_mqtt_jwt_secret_key_2026}
    
  shadow:
    enabled: true
    ttl: 604800000

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/mqtt
    port: 8080