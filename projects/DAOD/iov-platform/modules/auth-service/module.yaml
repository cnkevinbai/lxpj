# Auth Service - 认证服务

id: auth-service
name: Authentication Service
version: 1.0.0
description: 认证授权服务，提供 JWT Token 认证、权限验证能力
type: service
priority: 90

dependencies:
  - common-core
  - user-service

provides:
  - api: AuthService
    version: 1.0.0

configuration:
  jwt:
    secret: ${JWT_SECRET:daod_iov_jwt_secret_key_2026}
    expiration: 86400000
    refresh-expiration: 604800000
  
  password:
    min-length: 8
    require-special: true

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/auth
    port: 8080