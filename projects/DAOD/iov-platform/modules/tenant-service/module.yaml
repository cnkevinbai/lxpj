# Tenant Service - 租户服务

id: tenant-service
name: Tenant Service
version: 1.0.0
description: 租户服务，提供多租户管理、租户配置能力
type: service
priority: 95

dependencies:
  - common-core

provides:
  - api: TenantService
    version: 1.0.0

configuration:
  tenant:
    max-count: 1000
    default-quota: 100

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/tenant
    port: 8080