# HTTP Adapter - HTTP 协议适配器

id: http-adapter
name: HTTP Adapter
version: 1.0.0
description: HTTP 协议适配器，支持轻量设备接入、签名验证、幂等设计
type: adapter
priority: 45

dependencies:
  - common-core
  - vehicle-access

provides:
  - api: HttpAdapterService
    version: 1.0.0

configuration:
  http:
    port: 8080
    max-content-length: 10485760
  
  signature:
    enabled: true
    ttl: 300000
  
  idempotent:
    enabled: true
    cache-size: 10000

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/http
    port: 8080