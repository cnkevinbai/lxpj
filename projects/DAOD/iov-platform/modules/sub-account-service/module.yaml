# Sub Account Service - 子账号服务

id: sub-account-service
name: Sub Account Service
version: 1.0.0
description: 子账号服务，提供子账号管理、权限继承能力
type: service
priority: 82

dependencies:
  - common-core
  - user-service

provides:
  - api: SubAccountService
    version: 1.0.0

configuration:
  sub-account:
    max-per-tenant: 100

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true

endpoints:
  api:
    path: /api/v1/sub-account
    port: 8080