# JT/T 808 Adapter - JT/T 808 协议适配器

id: jtt808-adapter
name: JT/T 808 Adapter
version: 1.0.0
description: JT/T 808 协议适配器，支持车载终端接入、鉴权码验证、重连恢复
type: adapter
priority: 40

dependencies:
  - common-core
  - vehicle-access

provides:
  - api: Jtt808AdapterService
    version: 1.0.0

configuration:
  server:
    port: 8808
    boss-threads: 1
    worker-threads: 4
  
  protocol:
    version: 2019
    encoding: GBK
  
  auth:
    code-ttl: 86400000
    reconnect-window: 1800000

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true