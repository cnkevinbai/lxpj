# Alarm Service - 告警服务

id: alarm-service
name: Alarm Service
version: 1.0.0
description: 告警管理服务，提供告警处理、推送、聚合能力
type: service
priority: 70

dependencies:
  - common-core
  - event-bus

provides:
  - api: AlarmService
    version: 1.0.0

configuration:
  alarm:
    retention-days: 90
    max-retry: 3
    push-timeout: 5000
  
  notification:
    channels:
      - dingtalk
      - wechat
      - email
    enabled: true

health-check:
  enabled: true
  interval: 30s

metrics:
  enabled: true
  endpoint: /actuator/prometheus

endpoints:
  api:
    path: /api/v1/alarm
    port: 8080