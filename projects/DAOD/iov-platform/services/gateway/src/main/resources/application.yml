server:
  port: 8080

spring:
  application:
    name: iov-gateway
  
  cloud:
    gateway:
      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      
      # 路由配置
      routes:
        # 车辆接入服务
        - id: vehicle-access
          uri: lb://vehicle-access
          predicates:
            - Path=/api/v1/vehicle/**,/api/v1/terminal/**,/api/v1/binding/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: vehicleAccessCircuitBreaker
                fallbackUri: forward:/fallback/vehicle-access
        
        # 监控服务
        - id: monitor-service
          uri: lb://monitor-service
          predicates:
            - Path=/api/v1/monitor/**,/api/v1/position/**,/api/v1/trajectory/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
        
        # 告警服务
        - id: alarm-service
          uri: lb://alarm-service
          predicates:
            - Path=/api/v1/alarm/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
        
        # OTA服务
        - id: ota-service
          uri: lb://ota-service
          predicates:
            - Path=/api/v1/ota/**,/api/v1/firmware/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
        
        # 远程控制服务
        - id: remote-control
          uri: lb://remote-control
          predicates:
            - Path=/api/v1/command/**,/api/v1/remote/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
        
        # 用户服务
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/user/**
        
        # 认证服务
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/login/**,/api/v1/token/**
        
        # 租户服务
        - id: tenant-service
          uri: lb://tenant-service
          predicates:
            - Path=/api/v1/tenant/**
        
        # MQTT 适配器
        - id: mqtt-adapter
          uri: lb://mqtt-adapter
          predicates:
            - Path=/api/v1/mqtt/**
        
        # HTTP 适配器
        - id: http-adapter
          uri: lb://http-adapter
          predicates:
            - Path=/api/v1/http/**,/api/v1/webhook/**
        
        # JT/T 808 适配器
        - id: jtt808-adapter
          uri: lb://jtt808-adapter
          predicates:
            - Path=/api/v1/jtt808/**,/api/v1/protocol/**
        
        # 边缘网关
        - id: edge-gateway
          uri: lb://edge-gateway
          predicates:
            - Path=/api/v1/edge/**
        
        # 规划服务
        - id: planning-service
          uri: lb://planning-service
          predicates:
            - Path=/api/v1/planning/**,/api/v1/route/**,/api/v1/schedule/**

      # 默认过滤器
      default-filters:
        - AddRequestHeader=X-Gateway-Time, ${spring.cloud.gateway.routes[0].id}
        - AddResponseHeader=X-Response-Time, ${spring.cloud.gateway.routes[0].id}
  
  # Redis 配置 (限流)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  
  # Nacos 服务发现
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: IOV_PLATFORM

# 熔断配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 5
    instances:
      vehicleAccessCircuitBreaker:
        baseConfig: default
      monitorCircuitBreaker:
        baseConfig: default
      alarmCircuitBreaker:
        baseConfig: default
  
  # 限流配置
  ratelimiter:
    configs:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    root: INFO
    com.daod.iov: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 安全配置
security:
  # JWT 配置
  jwt:
    secret: ${JWT_SECRET:daod_iov_jwt_secret_key_2026}
    expiration: 86400000  # 24小时
    header: Authorization
    prefix: "Bearer "
  
  # 白名单路径 (不需要认证)
  whitelist:
    - /api/v1/auth/login
    - /api/v1/auth/register
    - /api/v1/auth/refresh
    - /api/v1/health
    - /actuator/**
    - /fallback/**